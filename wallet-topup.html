<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up Wallet | AUTOPAY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* Information Card */

.info-card{
display:flex;
gap:15px;
align-items:flex-start;
margin-top:20px;
padding:18px;
background:#111827;
border:1px solid #2b3750;
border-radius:16px;
}

.info-icon{
width:48px;
height:48px;
background:#2563eb;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
flex-shrink:0;
}

.info-text h4{
font-size:16px;
margin-bottom:8px;
}

.info-text p{
font-size:14px;
color:#94a3b8;
line-height:1.6;
}

#topupBtn{
width:100%;
margin-top:22px;
padding:16px;
border:none;
border-radius:14px;
background:#2563eb;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

#topupBtn:hover{
background:#1d4ed8;
transform:translateY(-2px);
}

/* Confirmation Popup */

.popup-details{
margin:20px 0;
padding:18px;
background:#111827;
border:1px solid #2b3750;
border-radius:14px;
text-align:left;
}

.popup-details p{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 0;
margin:0;
}

.popup-details p:not(:last-child){
border-bottom:1px solid #2b3750;
}

.popup-buttons{
display:flex;
gap:12px;
margin-top:20px;
}

.popup-buttons button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:15px;
font-weight:bold;
}

.secondary-btn{
background:#475569;
color:#fff;
}

/* Light Theme */

body.light .info-card,
body.light .popup-details{
background:#f8fafc;
border-color:#dbe2ea;
}

body.light .info-text p{
color:#64748b;
}

body.light .popup-details p{
border-color:#e5e7eb;
}
</style>

</head>

<body>

<div class="header">
<a href="dashboard.html">&#8592;</a>
Top Up Wallet
</div>

<div class="container">

<div class="card">

<div class="balanceTitle">
Current Wallet Balance
</div>

<div class="balance">
<small>KSh</small>
<span id="walletBalance">0.00</span>
</div>

</div>

<div class="card">

<label>
M-Pesa Number
</label>

<input
type="tel"
id="phone"
placeholder="07XXXXXXXX">

<label>
Amount (KES)
</label>

<input
type="number"
id="amount"
placeholder="Enter amount">

<div class="summary">

<span>
You'll Receive
</span>

<strong>
KSh <span id="receiveAmount">0</span>
</strong>

</div>

<button
class="btn"
id="topupBtn">

Top Up Wallet

</button>

<div class="note">

🔒 Secure payment via M-Pesa

</div>

</div>

</div>

<div class="loader" id="loader">

<div class="spinner"></div>

<p>
Sending STK Push...
</p>

</div>

<div class="popup" id="popup">

<div class="popupTitle" id="popupTitle">

Success

</div>

<div id="popupMessage">

Message

</div>

<button onclick="closePopup()">

OK

</button>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

/*
=========================================
CURRENT USER
=========================================
*/

let currentUser = null;

/*
=========================================
AUTH
=========================================
*/

onAuthStateChanged(auth, async (user) => {

    if (!user) {

        window.location.href = "login.html";
        return;

    }

    currentUser = user;

    loadMerchant();

});

/*
=========================================
LOAD MERCHANT
=========================================
*/

async function loadMerchant() {

    try {

        const token = await currentUser.getIdToken();

        const response = await fetch(
            `https://autopay-backend-1y64.onrender.com/api/merchant/${currentUser.uid}`,
            {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            }
        );

        const result = await response.json();

        if (!result.success) {

            showPopup(
                "Error",
                result.message
            );

            return;

        }

        const merchant = result.merchant;

        document.getElementById("walletBalance").textContent =
            Number(
                merchant.walletBalance || 0
            ).toLocaleString(undefined,{
                minimumFractionDigits:2,
                maximumFractionDigits:2
            });

        document.getElementById("phone").value =
            merchant.phone || "";

    } catch(err){

        console.error(err);

        showPopup(
            "Error",
            "Unable to load merchant account."
        );

    }

}

/*
=========================================
LIVE AMOUNT
=========================================
*/

const amountInput =
document.getElementById("amount");

amountInput.addEventListener("input", () => {

    const amount =
        Number(amountInput.value) || 0;

    document.getElementById("receiveAmount")
        .textContent =
        amount.toLocaleString();

});

/*
=========================================
POPUP
=========================================
*/

window.showPopup = function(title, message) {

    document.getElementById("popupTitle").innerHTML =
        title;

    document.getElementById("popupMessage").innerHTML =
        message;

    document.getElementById("popup").style.display =
        "block";

}

window.closePopup = function() {

    document.getElementById("popup").style.display =
        "none";

}

/*
=========================================
BACKEND URL
=========================================
*/

const API_BASE =
"https://autopay-backend-1y64.onrender.com";

/*
=========================================
TOP UP WALLET
=========================================
*/

document.getElementById("topupBtn")
.addEventListener("click", topupWallet);

async function topupWallet() {

    const phone =
        document.getElementById("phone").value.trim();

    const amount =
        Number(document.getElementById("amount").value);

    if (!phone) {

        showPopup(
            "Phone Required",
            "Enter your M-Pesa number."
        );

        return;

    }

    if (!amount || amount < 1) {

        showPopup(
            "Invalid Amount",
            "Enter a valid amount."
        );

        return;

    }

    try {

        document.getElementById("loader").style.display =
            "flex";

        const token =
            await currentUser.getIdToken();

        const response =
            await fetch(
                `${API_BASE}/api/stk-push`,
                {
                    method: "POST",

                    headers: {

                        "Content-Type":
                        "application/json",

                        "Authorization":
                        `Bearer ${token}`

                    },

                    body: JSON.stringify({

                        uid: currentUser.uid,

                        phone,

                        amount,

                        balanceType: "wallet"

                    })

                }
            );

        const result =
            await response.json();

        if (!response.ok || !result.success) {

            document.getElementById("loader").style.display =
                "none";

            showPopup(
                "Payment Failed",
                result.message ||
                "Unable to initiate payment."
            );

            return;

        }

        const checkoutRequestId =
            result.checkout_request_id ||
            result.data?.checkout_request_id ||
            result.data?.CheckoutRequestID;

        if (!checkoutRequestId) {

            document.getElementById("loader").style.display =
                "none";

            showPopup(
                "Error",
                "Checkout Request ID not returned by the server."
            );

            return;

        }

        checkPaymentStatus(checkoutRequestId);

    } catch (err) {

        console.error(err);

        document.getElementById("loader").style.display =
            "none";

        showPopup(
            "Network Error",
            "Unable to connect to the server."
        );

    }

}

/*
=========================================
CHECK PAYMENT STATUS
=========================================
*/

async function checkPaymentStatus(checkoutRequestId) {

    let attempts = 0;

    const timer = setInterval(async () => {

        attempts++;

        try {

            const token =
                await currentUser.getIdToken();

            const response =
                await fetch(
                    `${API_BASE}/api/check-status`,
                    {
                        method: "POST",

                        headers: {

                            "Content-Type":
                            "application/json",

                            "Authorization":
                            `Bearer ${token}`

                        },

                        body: JSON.stringify({

                            uid: currentUser.uid,

                            checkout_request_id:
                            checkoutRequestId,

                            balanceType:
                            "wallet"

                        })

                    }
                );

            const result =
                await response.json();

            if (result.data.status === "SUCCESS") {

                clearInterval(timer);

                document.getElementById("loader").style.display =
                    "none";

                await loadMerchant();

                showPopup(
                    "Payment Successful",
                    "Your wallet has been credited successfully."
                );

            }

            if (
    result.data.status === "FAILED" ||
    result.data.status === "CANCELLED"
) {

                clearInterval(timer);

                document.getElementById("loader").style.display =
                    "none";

                showPopup(
                    "Payment Failed",
                    "The transaction was not completed."
                );

            }

            if (attempts >= 24) {

                clearInterval(timer);

                document.getElementById("loader").style.display =
                    "none";

                showPopup(
                    "Timed Out",
                    "The payment is taking longer than expected. Please check your transaction history later."
                );

            }

        } catch (err) {

            console.error(err);

        }

    }, 3000);

}

</script>

</body>
  </html>
