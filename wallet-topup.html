<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up Wallet | AUTOPAY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f5f7fb;
color:#1e293b;
}

.header{
height:65px;
background:#2563eb;
color:#fff;
display:flex;
align-items:center;
padding:0 18px;
font-size:18px;
font-weight:700;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.header a{
color:#fff;
text-decoration:none;
margin-right:15px;
font-size:22px;
}

.container{
max-width:550px;
margin:25px auto;
padding:15px;
}

.card{
background:#fff;
border-radius:18px;
padding:22px;
box-shadow:0 8px 25px rgba(0,0,0,.06);
margin-bottom:18px;
}

.balanceTitle{
font-size:14px;
color:#64748b;
margin-bottom:8px;
}

.balance{
font-size:32px;
font-weight:700;
color:#2563eb;
}

.balance small{
font-size:16px;
}

label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-size:14px;
font-weight:600;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #dbe2ea;
font-size:15px;
outline:none;
transition:.3s;
}

input:focus{
border-color:#2563eb;
box-shadow:0 0 0 3px rgba(37,99,235,.15);
}

.summary{
margin-top:20px;
background:#eff6ff;
padding:15px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.summary span:first-child{
color:#64748b;
}

.summary strong{
font-size:20px;
color:#2563eb;
}

.btn{
margin-top:25px;
width:100%;
padding:15px;
background:#2563eb;
color:#fff;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
background:#1d4ed8;
}

.note{
margin-top:18px;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
font-size:14px;
color:#64748b;
}

.loader{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(255,255,255,.95);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
flex-direction:column;
}

.spinner{
width:60px;
height:60px;
border:6px solid #dbeafe;
border-top:6px solid #2563eb;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.popup{
position:fixed;
left:50%;
bottom:25px;
transform:translateX(-50%);
background:#fff;
padding:18px 20px;
border-radius:14px;
box-shadow:0 8px 30px rgba(0,0,0,.15);
display:none;
width:90%;
max-width:360px;
z-index:10000;
}

.popupTitle{
font-weight:700;
margin-bottom:8px;
}

.popup button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<a href="dashboard.html">&#8592;</a>
Top Up Wallet
</div>

<div class="container">

<div class="card">

<div class="balanceTitle">
Current Wallet Balance
</div>

<div class="balance">
<small>KSh</small>
<span id="walletBalance">0.00</span>
</div>

</div>

<div class="card">

<label>
M-Pesa Number
</label>

<input
type="tel"
id="phone"
placeholder="07XXXXXXXX">

<label>
Amount (KES)
</label>

<input
type="number"
id="amount"
placeholder="Enter amount">

<div class="summary">

<span>
You'll Receive
</span>

<strong>
KSh <span id="receiveAmount">0</span>
</strong>

</div>

<button
class="btn"
id="topupBtn">

Top Up Wallet

</button>

<div class="note">

🔒 Secure payment via M-Pesa

</div>

</div>

</div>

<div class="loader" id="loader">

<div class="spinner"></div>

<p>
Sending STK Push...
</p>

</div>

<div class="popup" id="popup">

<div class="popupTitle" id="popupTitle">

Success

</div>

<div id="popupMessage">

Message

</div>

<button onclick="closePopup()">

OK

</button>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
    doc,
    getDoc
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

/*
=========================================
CURRENT USER
=========================================
*/

let currentUser = null;

/*
=========================================
AUTH
=========================================
*/

onAuthStateChanged(auth, async (user) => {

    if (!user) {

        window.location.href = "login.html";
        return;

    }

    currentUser = user;

    loadMerchant();

});

/*
=========================================
LOAD MERCHANT
=========================================
*/

async function loadMerchant() {

    try {

        const token = await currentUser.getIdToken();

        const response = await fetch(
            `https://autopay-backend-1y64.onrender.com/api/merchant/${currentUser.uid}`,
            {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            }
        );

        const result = await response.json();

        if (!result.success) {

            showPopup(
                "Error",
                result.message
            );

            return;

        }

        const merchant = result.merchant;

        document.getElementById("walletBalance").textContent =
            Number(
                merchant.walletBalance || 0
            ).toLocaleString(undefined,{
                minimumFractionDigits:2,
                maximumFractionDigits:2
            });

        document.getElementById("phone").value =
            merchant.phone || "";

    } catch(err){

        console.error(err);

        showPopup(
            "Error",
            "Unable to load merchant account."
        );

    }

}

/*
=========================================
LIVE AMOUNT
=========================================
*/

const amountInput =
document.getElementById("amount");

amountInput.addEventListener("input", () => {

    const amount =
        Number(amountInput.value) || 0;

    document.getElementById("receiveAmount")
        .textContent =
        amount.toLocaleString();

});

/*
=========================================
POPUP
=========================================
*/

window.showPopup = function(title, message) {

    document.getElementById("popupTitle").innerHTML =
        title;

    document.getElementById("popupMessage").innerHTML =
        message;

    document.getElementById("popup").style.display =
        "block";

}

window.closePopup = function() {

    document.getElementById("popup").style.display =
        "none";

}

/*
=========================================
BACKEND URL
=========================================
*/

const API_BASE =
"https://autopay-backend-1y64.onrender.com";

/*
=========================================
TOP UP WALLET
=========================================
*/

document.getElementById("topupBtn")
.addEventListener("click", topupWallet);

async function topupWallet() {

    const phone =
        document.getElementById("phone").value.trim();

    const amount =
        Number(document.getElementById("amount").value);

    if (!phone) {

        showPopup(
            "Phone Required",
            "Enter your M-Pesa number."
        );

        return;

    }

    if (!amount || amount < 1) {

        showPopup(
            "Invalid Amount",
            "Enter a valid amount."
        );

        return;

    }

    try {

        document.getElementById("loader").style.display =
            "flex";

        const token =
            await currentUser.getIdToken();

        const response =
            await fetch(
                `${API_BASE}/api/stk-push`,
                {
                    method: "POST",

                    headers: {

                        "Content-Type":
                        "application/json",

                        "Authorization":
                        `Bearer ${token}`

                    },

                    body: JSON.stringify({

                        uid: currentUser.uid,

                        phone,

                        amount,

                        balanceType: "wallet"

                    })

                }
            );

        const result =
            await response.json();

        if (!response.ok || !result.success) {

            document.getElementById("loader").style.display =
                "none";

            showPopup(
                "Payment Failed",
                result.message ||
                "Unable to initiate payment."
            );

            return;

        }

        const checkoutRequestId =
            result.checkout_request_id ||
            result.data?.checkout_request_id ||
            result.data?.CheckoutRequestID;

        if (!checkoutRequestId) {

            document.getElementById("loader").style.display =
                "none";

            showPopup(
                "Error",
                "Checkout Request ID not returned by the server."
            );

            return;

        }

        checkPaymentStatus(checkoutRequestId);

    } catch (err) {

        console.error(err);

        document.getElementById("loader").style.display =
            "none";

        showPopup(
            "Network Error",
            "Unable to connect to the server."
        );

    }

}

/*
=========================================
CHECK PAYMENT STATUS
=========================================
*/

async function checkPaymentStatus(checkoutRequestId) {

    let attempts = 0;

    const timer = setInterval(async () => {

        attempts++;

        try {

            const token =
                await currentUser.getIdToken();

            const response =
                await fetch(
                    `${API_BASE}/api/check-status`,
                    {
                        method: "POST",

                        headers: {

                            "Content-Type":
                            "application/json",

                            "Authorization":
                            `Bearer ${token}`

                        },

                        body: JSON.stringify({

                            uid: currentUser.uid,

                            checkout_request_id:
                            checkoutRequestId,

                            balanceType:
                            "wallet"

                        })

                    }
                );

            const result =
                await response.json();

            if (result.status === "SUCCESS") {

                clearInterval(timer);

                document.getElementById("loader").style.display =
                    "none";

                await loadMerchant();

                showPopup(
                    "Payment Successful",
                    "Your wallet has been credited successfully."
                );

            }

            if (
                result.status === "FAILED" ||
                result.status === "CANCELLED"
            ) {

                clearInterval(timer);

                document.getElementById("loader").style.display =
                    "none";

                showPopup(
                    "Payment Failed",
                    "The transaction was not completed."
                );

            }

            if (attempts >= 24) {

                clearInterval(timer);

                document.getElementById("loader").style.display =
                    "none";

                showPopup(
                    "Timed Out",
                    "The payment is taking longer than expected. Please check your transaction history later."
                );

            }

        } catch (err) {

            console.error(err);

        }

    }, 5000);

}

</script>

</body>
  </html>
