<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTOPAY | Merchant Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:linear-gradient(#f5f9ff,#ffffff);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:430px;
background:#fff;
border:1px solid #e5e7eb;
border-radius:22px;
padding:28px;
box-shadow:0 20px 40px rgba(37,99,235,.08);
}

.logo{
text-align:center;
font-size:30px;
font-weight:800;
color:#2563EB;
margin-bottom:8px;
}

h2{
text-align:center;
margin-bottom:6px;
}

.subtitle{
text-align:center;
color:#64748b;
margin-bottom:25px;
}

label{
display:block;
margin:14px 0 6px;
font-weight:600;
}

input{
width:100%;
padding:14px;
border:1px solid #d1d5db;
border-radius:12px;
outline:none;
font-size:15px;
}

input:focus{
border-color:#2563EB;
}

.password-wrap{
position:relative;
}

.password-wrap input{
padding-right:45px;
}

.toggle{
position:absolute;
top:50%;
right:14px;
transform:translateY(-50%);
cursor:pointer;
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
margin:18px 0;
font-size:14px;
}

.options label{
margin:0;
font-weight:500;
display:flex;
align-items:center;
gap:6px;
}

.options input{
width:auto;
}

.options a{
text-decoration:none;
color:#2563EB;
font-weight:600;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#2563EB;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.signup{
margin-top:18px;
text-align:center;
}

.signup a{
color:#2563EB;
text-decoration:none;
font-weight:700;
}

/* Popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.45);
z-index:9999;
}

.popup-box{
background:#fff;
width:90%;
max-width:340px;
padding:24px;
border-radius:18px;
text-align:center;
animation:pop .25s ease;
}

.popup-icon{
width:70px;
height:70px;
margin:auto;
margin-bottom:15px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
background:#16a34a;
color:white;
}

.popup-box p{
margin:15px 0;
color:#64748b;
}

@keyframes pop{

from{
transform:scale(.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

</style>

</head>

<body>

<div class="card">

<div class="logo">⚡ AUTOPAY</div>

<h2>Merchant Login</h2>

<p class="subtitle">
Sign in using your Email or Username.
</p>

<form id="loginForm">

<label>Email or Username</label>

<input
id="identifier"
type="text"
placeholder="Email or Username"
required>

<label>Password</label>

<div class="password-wrap">

<input
id="password"
type="password"
placeholder="Password"
required>

<span
class="toggle"
onclick="togglePassword()">
👁️
</span>

</div>

<div class="options">

<label>

<input
id="remember"
type="checkbox">

Remember Me

</label>

<a href="#">
Forgot Password?
</a>

</div>

<button
id="loginBtn"
type="submit">

Login

</button>

</form>

<div class="signup">

Don't have an account?

<a href="signup.html">

Create Account

</a>

</div>

</div>

<div
id="popup"
class="popup">

<div class="popup-box">

<div
id="popupIcon"
class="popup-icon">

✓

</div>

<h3 id="popupTitle"></h3>

<p id="popupMessage"></p>

<button
type="button"
onclick="closePopup()">

OK

</button>

</div>

</div>
<script type="module">

import { auth, db } from "./firebase.js";

import {
signInWithEmailAndPassword,
setPersistence,
browserLocalPersistence,
browserSessionPersistence,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

function togglePassword(){

const input=document.getElementById("password");

if(input.type==="password"){
input.type="text";
}else{
input.type="password";
}

}

window.togglePassword=togglePassword;

function showPopup(title,message,success=true){

document.getElementById("popupTitle").innerText=title;

document.getElementById("popupMessage").innerText=message;

const icon=document.getElementById("popupIcon");

icon.innerHTML=success?"✓":"✕";

icon.style.background=success?"#16a34a":"#ef4444";

document.getElementById("popup").style.display="flex";

}

window.closePopup=function(){

document.getElementById("popup").style.display="none";

};

onAuthStateChanged(auth,user=>{

if(user){

window.location.href="dashboard.html";

}

});

document.getElementById("loginForm").addEventListener("submit",async(e)=>{

e.preventDefault();

const btn=document.getElementById("loginBtn");

btn.disabled=true;

btn.innerHTML="Signing In...";

const remember=document.getElementById("remember").checked;

await setPersistence(
auth,
remember
?browserLocalPersistence
:browserSessionPersistence
);

let identifier=document.getElementById("identifier").value.trim();

const password=document.getElementById("password").value;

try{

let email=identifier;

if(!identifier.includes("@")){

const username=identifier.toLowerCase();

const usernameDoc=await getDoc(
doc(db,"usernames",username)
);

if(!usernameDoc.exists()){

throw new Error("Username not found.");

}

email=usernameDoc.data().email;

}

await signInWithEmailAndPassword(

auth,
email,
password

);

showPopup(

"Success",

"Login successful. Redirecting..."

);

setTimeout(()=>{

window.location.href="dashboard.html";

},1200);

}catch(error){

console.log(error);

btn.disabled=false;

btn.innerHTML="Login";

showPopup(

"Login Failed",

error.message,

false

);

}

});

</script>
</body>
</html>
