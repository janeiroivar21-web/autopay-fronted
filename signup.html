
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTOPAY | Create Merchant Account</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:linear-gradient(#f5f9ff,#fff);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{width:100%;max-width:430px;background:#fff;border:1px solid #e5e7eb;border-radius:22px;padding:28px;box-shadow:0 20px 40px rgba(37,99,235,.08)}
.logo{text-align:center;font-size:30px;font-weight:800;color:#2563eb}
h2{text-align:center;margin:8px 0}
.subtitle{text-align:center;color:#64748b;margin-bottom:20px}
label{display:block;margin:14px 0 6px;font-weight:600}
input{width:100%;padding:14px;border:1px solid #d1d5db;border-radius:12px}
.password-wrap{position:relative}
.password-wrap input{padding-right:48px}
.toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer}
.check{display:flex;gap:10px;margin:18px 0;font-size:14px}
.check input{width:auto}
button{width:100%;padding:15px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}
.login{text-align:center;margin-top:18px}
.login a{color:#2563eb;text-decoration:none;font-weight:700}
.small{display:none;color:#16a34a;font-size:12px;margin-top:4px}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:#fff;
width:90%;
max-width:340px;
padding:25px;
border-radius:18px;
text-align:center;
animation:pop .25s ease;
}

.popup-icon{
width:70px;
height:70px;
margin:auto;
margin-bottom:15px;
border-radius:50%;
background:#16a34a;
color:#fff;
font-size:34px;
display:flex;
align-items:center;
justify-content:center;
}

.popup-box p{
margin:15px 0;
color:#64748b;
}

@keyframes pop{
from{
transform:scale(.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}
</style>
</head>
<body>
<div class="card">
<div class="logo">⚡ AUTOPAY</div>
<h2>Create Your Merchant Account</h2>
<p class="subtitle">Start accepting secure payments with AUTOPAY.</p>
<form id="signupForm" autocomplete="off">
<label>Full Name</label>
<input id="fullName" type="text" placeholder="Enter your full name" required>
<label>Username</label>
<input id="username" type="text" placeholder="Choose username" required><div id="available" class="small">✓ Username format looks good.</div>
<label>Email Address</label>
<input id="email" type="email" placeholder="Enter email" required>
<label>Phone Number</label>
<input id="phone" type="tel" placeholder="07XXXXXXXX" required>
<label>Password</label>
<div class="password-wrap">
    <input id="password" type="password" placeholder="Create password" required>
    <span class="toggle" onclick="togglePassword('password',this)">👁️</span>
</div>
<label>Confirm Password</label>
<div class="password-wrap"><input id="confirmPassword" type="password" placeholder="Confirm password" required><span class="toggle" onclick="togglePassword('confirmPassword',this)">👁️</span></div>
<label>Referral Code (Optional)</label>
<input id="referralCode" type="text" placeholder="Referral code (optional)">
<div class="check">
    <input id="terms" type="checkbox" required>

    <div>
        I agree to the
        <a href="#">Terms of Service</a>
        and
        <a href="#">Privacy Policy</a>.
    </div>
</div>
<button
id="signupBtn"
type="submit">
Create Merchant Account
</button>
</form>
<div class="login">Already have an account? <a href="login.html">Login</a></div>

</div>

<div id="popup" class="popup">
<div class="popup-box">

<div id="popupIcon" class="popup-icon">✓</div>

<h3 id="popupTitle"></h3>

<p id="popupMessage"></p>

<button type="button" onclick="closePopup()">OK</button>

</div>
</div>
<script type="module">

import { auth, db } from "./firebase.js";

import {
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
doc,
setDoc,
serverTimestamp,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";


function togglePassword(id,icon){
const input=document.getElementById(id);

if(input.type==="password"){
input.type="text";
icon.textContent="🙈";
}else{
input.type="password";
icon.textContent="👁️";
}
}

window.togglePassword=togglePassword;

function showPopup(title,message,success=true){

document.getElementById("popupTitle").innerText=title;

document.getElementById("popupMessage").innerText=message;

const icon=document.getElementById("popupIcon");

icon.innerHTML=success?"✓":"✕";

icon.style.background=success?"#16a34a":"#ef4444";

document.getElementById("popup").style.display="flex";

}

window.closePopup=function(){

document.getElementById("popup").style.display="none";

}
  
document.getElementById("username").addEventListener("input",function(){

const ok=/^[a-zA-Z0-9_]{4,20}$/.test(this.value);

document.getElementById("available").style.display=
ok?"block":"none";

});


document.getElementById("signupForm").addEventListener("submit",async(e)=>{

e.preventDefault();

const btn = document.getElementById("signupBtn");

btn.disabled = true;
btn.innerHTML = "Creating Account...";

const fullName=document.getElementById("fullName").value.trim();

const username=document.getElementById("username").value.trim().toLowerCase();

const email=document.getElementById("email").value.trim();

let phone = document.getElementById("phone").value.trim();

const phoneRegex = /^(07\d{8}|01\d{8}|\+2547\d{8}|\+2541\d{8})$/;

if (!phoneRegex.test(phone)) {
    showPopup(
"Invalid Phone Number",
"Please enter a valid Kenyan phone number.",
false
);

btn.disabled = false;
btn.innerHTML = "Create Merchant Account";

return;
}

// Convert to 254 format for storage
if (phone.startsWith("07") || phone.startsWith("01")) {
    phone = "254" + phone.substring(1);
} else if (phone.startsWith("+254")) {
    phone = phone.substring(1);
}
  
const password=document.getElementById("password").value;

const confirm=document.getElementById("confirmPassword").value;

const referral=document.getElementById("referralCode").value.trim();

if(password!==confirm){
showPopup(
"Password Error",
"Passwords do not match.",
false
);

btn.disabled = false;
btn.innerHTML = "Create Merchant Account";

return;
}

try{

const q=query(
collection(db,"users"),
where("username","==",username)
);

const existing=await getDocs(q);

if(!existing.empty){
showPopup(
"Username Taken",
"Please choose another username.",
false
);

btn.disabled = false;
btn.innerHTML = "Create Merchant Account";

return;
}

const userCredential=
await createUserWithEmailAndPassword(
auth,
email,
password
);

const uid=userCredential.user.uid;

await setDoc(doc(db,"users",uid),{

uid,

merchantId: "APY" + Math.floor(100000 + Math.random() * 900000),

fullName,

username,

email,

phone,

referralCode:referral,

walletBalance:0,

serviceBalance:0,

country:"Kenya",

currency:"KES",

verified:false,

accountStatus:"Active",

createdAt:serverTimestamp()

});

showPopup(
"Success",
"Merchant account created successfully."
);

setTimeout(()=>{

window.location.href="login.html";

},2000);

} catch(error){

btn.disabled = false;
btn.innerHTML = "Create Merchant Account";

showPopup(
"Registration Failed",
error.message,
false
);

}

});

</script>

</body>
</html>
