<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Transactions - AUTOPAY</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* CSS will be added next */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0c1424;
color:#fff;
transition:.3s;
}

.container{
max-width:430px;
margin:auto;
padding:18px;
padding-bottom:90px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:22px;
}

.back-btn,
.avatar{
width:48px;
height:48px;
background:#182235;
border:1px solid #253149;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.3s;
}

.back-btn:hover,
.avatar:hover{
transform:translateY(-2px);
}

.title{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
}

.title i{
color:#2563eb;
}

.summary-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
margin-bottom:20px;
}

.summary-card{
background:#182235;
border:1px solid #253149;
border-radius:18px;
padding:18px;
}

.summary-card .label{
font-size:12px;
color:#94a3b8;
margin-bottom:8px;
}

.summary-card h2{
font-size:24px;
}

.summary-card.success{
border-left:4px solid #22c55e;
}

.summary-card.pending{
border-left:4px solid #f59e0b;
}

.summary-card.failed{
border-left:4px solid #ef4444;
}

.search-card{
position:relative;
margin-bottom:18px;
}

.search-card input{
width:100%;
padding:15px 48px 15px 15px;
background:#182235;
border:1px solid #253149;
border-radius:14px;
color:#fff;
font-size:15px;
outline:none;
}

.search-card input:focus{
border-color:#2563eb;
}

.search-card i{
position:absolute;
right:18px;
top:16px;
color:#94a3b8;
}

.filter-row{
display:flex;
gap:10px;
overflow-x:auto;
margin-bottom:18px;
padding-bottom:5px;
}

.filter-row::-webkit-scrollbar{
display:none;
}

.filter-btn{
padding:10px 18px;
border:none;
border-radius:30px;
background:#182235;
border:1px solid #253149;
color:#fff;
cursor:pointer;
white-space:nowrap;
transition:.3s;
}

.filter-btn.active{
background:#2563eb;
border-color:#2563eb;
}

.transaction-card{
background:#182235;
border:1px solid #253149;
border-radius:18px;
padding:16px;
margin-bottom:14px;
cursor:pointer;
transition:.3s;
}

.transaction-card:hover{
transform:translateY(-3px);
}

.transaction-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.reference{
font-weight:bold;
font-size:15px;
}

.amount{
font-size:20px;
font-weight:bold;
}

.transaction-info{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:13px;
color:#94a3b8;
}

.status{
display:inline-flex;
align-items:center;
gap:6px;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.status.success{
background:#14532d;
color:#4ade80;
}

.status.pending{
background:#78350f;
color:#fbbf24;
}

.status.failed{
background:#7f1d1d;
color:#f87171;
}

.empty-state{
text-align:center;
padding:60px 25px;
color:#94a3b8;
}

.empty-state i{
font-size:70px;
margin-bottom:18px;
color:#2563eb;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.65);
z-index:1000;
}

.modal-card{
width:92%;
max-width:380px;
background:#182235;
border-radius:20px;
overflow:hidden;
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
border-bottom:1px solid #253149;
}

.modal-header i{
cursor:pointer;
font-size:20px;
}

.modal-body{
padding:20px;
}

.detail-row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #253149;
}

.detail-row:last-child{
border-bottom:none;
}

.copy-btn{
width:100%;
padding:14px;
margin-top:20px;
background:#2563eb;
border:none;
border-radius:12px;
color:#fff;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

body.light{
background:#f5f7fb;
color:#111827;
}

body.light .summary-card,
body.light .search-card input,
body.light .transaction-card,
body.light .modal-card,
body.light .back-btn,
body.light .avatar{
background:#fff;
border-color:#dbe2ea;
color:#111827;
}

body.light .summary-card .label,
body.light .transaction-info{
color:#64748b;
}

body.light .detail-row{
border-color:#e5e7eb;
}

body.light .filter-btn{
background:#fff;
border-color:#dbe2ea;
color:#111827;
}

body.light .filter-btn.active{
background:#2563eb;
color:#fff;
border-color:#2563eb;
}

@media(max-width:500px){

.summary-grid{
grid-template-columns:1fr 1fr;
}

.title{
font-size:20px;
}

.amount{
font-size:18px;
}

}
</style>

</head>
<body>

<div class="container">

<!-- Header -->

<div class="top">

<div class="back-btn" id="backBtn">
<i class="fas fa-arrow-left"></i>
</div>

<div class="title">
<i class="fas fa-money-check-dollar"></i>
<span>Transactions</span>
</div>

<div class="avatar" id="avatar">
AP
</div>

</div>

<!-- Summary -->

<div class="summary-grid">

<div class="summary-card">

<div class="label">TOTAL</div>

<h2 id="totalTransactions">0</h2>

</div>

<div class="summary-card success">

<div class="label">SUCCESS</div>

<h2 id="successTransactions">0</h2>

</div>

<div class="summary-card pending">

<div class="label">PENDING</div>

<h2 id="pendingTransactions">0</h2>

</div>

<div class="summary-card failed">

<div class="label">FAILED</div>

<h2 id="failedTransactions">0</h2>

</div>

</div>

<!-- Search -->

<div class="search-card">

<input
type="text"
id="searchInput"
placeholder="Search by reference or phone...">

<i class="fas fa-search"></i>

</div>

<!-- Filter -->

<div class="filter-row">

<button class="filter-btn active" data-filter="ALL">
All
</button>

<button class="filter-btn" data-filter="SUCCESS">
Success
</button>

<button class="filter-btn" data-filter="PENDING">
Pending
</button>

<button class="filter-btn" data-filter="FAILED">
Failed
</button>

</div>

<!-- Transactions -->

<div id="transactionList">

</div>

</div>

<!-- Empty State -->

<div class="empty-state" id="emptyState" style="display:none;">

<i class="fas fa-receipt"></i>

<h2>No Transactions</h2>

<p>

Your payment transactions will appear here.

</p>

</div>

<!-- Transaction Details -->

<div class="modal" id="detailsModal">

<div class="modal-card">

<div class="modal-header">

<h3>Transaction Details</h3>

<i class="fas fa-times" id="closeModal"></i>

</div>

<div class="modal-body" id="detailsContent">

</div>

</div>

</div>
<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
doc,
getDoc,
collection,
query,
where,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

// Theme
if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
}

let merchantId="";
let allTransactions=[];
let currentFilter="ALL";

// Authentication
onAuthStateChanged(auth,async(user)=>{

if(!user){
location.href="login.html";
return;
}

const snap=await getDoc(doc(db,"users",user.uid));

if(!snap.exists()){
location.href="login.html";
return;
}

const userData=snap.data();

merchantId=userData.merchantId;

document.getElementById("avatar").innerHTML=
(userData.fullName||"A").charAt(0).toUpperCase();

loadTransactions();

});

// Back
document.getElementById("backBtn").onclick=()=>history.back();

// Load Transactions
function loadTransactions(){

const q=query(

collection(db,"transactions"),

where("merchantId","==",merchantId),

orderBy("createdAt","desc")

);

onSnapshot(q,(snapshot)=>{

allTransactions=[];

let success=0;
let pending=0;
let failed=0;

snapshot.forEach(docSnap=>{

const data=docSnap.data();

data.id=docSnap.id;

allTransactions.push(data);

switch((data.status||"").toUpperCase()){

case "SUCCESS":
success++;
break;

case "FAILED":
failed++;
break;

default:
pending++;

}

});

document.getElementById("totalTransactions").innerHTML=
allTransactions.length;

document.getElementById("successTransactions").innerHTML=
success;

document.getElementById("pendingTransactions").innerHTML=
pending;

document.getElementById("failedTransactions").innerHTML=
failed;

renderTransactions();

});

}

// Search
document.getElementById("searchInput")
.addEventListener("input",renderTransactions);

// Filters
document.querySelectorAll(".filter-btn")
.forEach(btn=>{

btn.onclick=function(){

document.querySelectorAll(".filter-btn")
.forEach(b=>b.classList.remove("active"));

this.classList.add("active");

currentFilter=this.dataset.filter;

renderTransactions();

};

});

// Render
function renderTransactions(){

const list=document.getElementById("transactionList");

const empty=document.getElementById("emptyState");

const search=document
.getElementById("searchInput")
.value
.toLowerCase();

list.innerHTML="";

const filtered=allTransactions.filter(tx=>{

const status=(tx.status||"").toUpperCase();

const ref=(tx.checkoutRequestId||"").toLowerCase();

const phone=(tx.phone||"").toLowerCase();

const matchesSearch=
ref.includes(search)||phone.includes(search);

const matchesFilter=
currentFilter==="ALL"||status===currentFilter;

return matchesSearch&&matchesFilter;

});

if(filtered.length===0){

empty.style.display="block";

return;

}

empty.style.display="none";

filtered.forEach(tx=>{

const status=(tx.status||"PENDING").toUpperCase();

let css="pending";

if(status==="SUCCESS") css="success";

if(status==="FAILED") css="failed";

const date=tx.createdAt?.toDate
?tx.createdAt.toDate().toLocaleString()
:"";

list.innerHTML+=`

<div class="transaction-card"
onclick="showDetails('${tx.id}')">

<div class="transaction-top">

<div>

<div class="reference">

${tx.checkoutRequestId||tx.id.substring(0,10)}

</div>

<div class="transaction-info">

${tx.phone||""}

</div>

</div>

<div class="amount">

KES ${Number(tx.amount||0).toLocaleString()}

</div>

</div>

<div class="transaction-info">

<span>${date}</span>

<span class="status ${css}">

${status}

</span>

</div>

</div>

`;

});

}

// Modal
window.showDetails=function(id){

const tx=allTransactions.find(t=>t.id===id);

if(!tx) return;

document.getElementById("detailsContent").innerHTML=`

<div class="detail-row">

<span>Reference</span>

<strong>

${tx.checkoutRequestId||tx.id}

</strong>

</div>

<div class="detail-row">

<span>Phone</span>

<strong>

${tx.phone||"--"}

</strong>

</div>

<div class="detail-row">

<span>Amount</span>

<strong>

KES ${Number(tx.amount||0).toLocaleString()}

</strong>

</div>

<div class="detail-row">

<span>Status</span>

<strong>

${tx.status||"--"}

</strong>

</div>

<div class="detail-row">

<span>Merchant Request</span>

<strong>

${tx.merchantRequestId||"--"}

</strong>

</div>

<button
class="copy-btn"
onclick="copyReference('${tx.checkoutRequestId||tx.id}')">

Copy Reference

</button>

`;

document.getElementById("detailsModal").style.display="flex";

};

// Close Modal
document.getElementById("closeModal").onclick=()=>{

document.getElementById("detailsModal").style.display="none";

};

window.onclick=function(e){

const modal=document.getElementById("detailsModal");

if(e.target===modal){

modal.style.display="none";

}

};

// Copy
window.copyReference=function(ref){

navigator.clipboard.writeText(ref);

alert("Reference copied.");

};

</script>
</body>
</html>
