<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AUTOPAY Gateway</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* Paste ALL the CSS code I gave you here */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0c1424;
color:#fff;
transition:.3s;
}

.container{
max-width:430px;
margin:auto;
padding:18px;
padding-bottom:90px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:24px;
}

.back-btn,
.avatar{
width:48px;
height:48px;
background:#182235;
border:1px solid #253149;
border-radius:14px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:.3s;
}

.back-btn:hover,
.avatar:hover{
transform:translateY(-2px);
}

.title{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:bold;
}

.title i{
color:#2563eb;
}

.status-card{
background:#182235;
border:1px solid #253149;
border-radius:20px;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:22px;
}

.status-left h2{
font-size:20px;
margin-bottom:6px;
}

.status-left p{
color:#22c55e;
font-weight:bold;
}

.status-badge{
background:#22c55e;
color:#fff;
padding:8px 18px;
border-radius:30px;
font-size:13px;
font-weight:bold;
}

.section{
margin-bottom:24px;
}

.section h3{
margin-bottom:14px;
font-size:16px;
}

.info-card,
.endpoint-card,
.integration-card,
.sandbox-card{
background:#182235;
border:1px solid #253149;
border-radius:18px;
padding:18px;
margin-bottom:15px;
}

.info-row{
display:flex;
justify-content:space-between;
padding:14px 0;
border-bottom:1px solid #2b3750;
}

.info-row:last-child{
border-bottom:none;
}

.endpoint-card label{
display:block;
margin-bottom:10px;
color:#94a3b8;
font-size:13px;
}

.endpoint-box{
display:flex;
gap:10px;
align-items:center;
background:#111827;
border:1px solid #2b3750;
border-radius:12px;
padding:12px;
}

.endpoint-box span{
flex:1;
font-size:12px;
word-break:break-all;
}

.endpoint-box button{
background:#2563eb;
color:#fff;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.integration-card{
display:grid;
grid-template-columns:1fr;
gap:12px;
}

.integration-card button{
padding:15px;
background:#2563eb;
border:none;
border-radius:12px;
color:#fff;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.integration-card button:hover{
transform:translateY(-2px);
}

.sandbox-card input{
width:100%;
padding:15px;
margin-bottom:14px;
background:#111827;
border:1px solid #2b3750;
border-radius:12px;
color:#fff;
outline:none;
font-size:15px;
}

.sandbox-card input:focus{
border-color:#2563eb;
}

.sandbox-card button{
width:100%;
padding:16px;
background:#2563eb;
border:none;
border-radius:12px;
color:#fff;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.sandbox-card button:hover{
background:#1d4ed8;
}

body.light{
background:#f5f7fb;
color:#111827;
}

body.light .status-card,
body.light .info-card,
body.light .endpoint-card,
body.light .integration-card,
body.light .sandbox-card,
body.light .back-btn,
body.light .avatar{
background:#fff;
border-color:#dbe2ea;
color:#111827;
}

body.light .endpoint-box,
body.light .sandbox-card input{
background:#f9fafb;
border-color:#dbe2ea;
color:#111827;
}
</style>

</head>

<body>

<div class="container">

    <!-- Header -->

    <div class="top">

        <div class="back-btn" id="backBtn">
            <i class="fas fa-arrow-left"></i>
        </div>

        <div class="title">
            <i class="fas fa-bolt"></i>
            <span>AUTOPAY Gateway</span>
        </div>

        <div class="avatar" id="avatar">
            AP
        </div>

    </div>

    <!-- Gateway Status -->

    <div class="status-card">

        <div class="status-left">

            <h2>Gateway Status</h2>

            <p id="gatewayStatus">
                Online
            </p>

        </div>

        <div class="status-right">

            <span class="status-badge">
                LIVE
            </span>

        </div>

    </div>

    <!-- Merchant Information -->

    <div class="section">

        <h3>Merchant Details</h3>

        <div class="info-card">

            <div class="info-row">

                <span>Merchant ID</span>

                <strong id="merchantId">
                    Loading...
                </strong>

            </div>

            <div class="info-row">

                <span>Business Name</span>

                <strong id="businessName">
                    Loading...
                </strong>

            </div>

            <div class="info-row">

                <span>Account Status</span>

                <strong id="accountStatus">
                    Active
                </strong>

            </div>

        </div>

    </div>

    <!-- API Endpoints -->

    <div class="section">

        <h3>API Endpoints</h3>

        <div class="endpoint-card">

            <label>STK Push</label>

            <div class="endpoint-box">

                <span id="stkEndpoint">
                    https://autopay.co.ke/api/stk-push
                </span>

                <button id="copyStk">
                    Copy
                </button>

            </div>

        </div>

        <div class="endpoint-card">

            <label>Check Status</label>

            <div class="endpoint-box">

                <span id="statusEndpoint">
                    https://autopay.co.ke/api/check-status
                </span>

                <button id="copyStatus">
                    Copy
                </button>

            </div>

        </div>

        <div class="endpoint-card">

            <label>Webhook URL</label>

            <div class="endpoint-box">

                <span id="webhookEndpoint">
                    https://autopay.co.ke/api/webhook
                </span>

                <button id="copyWebhook">
                    Copy
                </button>

            </div>

        </div>

    </div>

    <!-- Integration -->

    <div class="section">

        <h3>Integration</h3>

        <div class="integration-card">

            <button id="phpBtn">
                PHP Example
            </button>

            <button id="nodeBtn">
                Node.js Example
            </button>

            <button id="javascriptBtn">
                JavaScript Example
            </button>

        </div>

    </div>

    <!-- Sandbox -->

    <div class="section">

        <h3>Gateway Test</h3>

        <div class="sandbox-card">

            <input
            type="text"
            id="testPhone"
            placeholder="254712345678">

            <input
            type="number"
            id="testAmount"
            placeholder="Amount">

            <button id="testGateway">

                Send Test STK Push

            </button>

        </div>

    </div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";

import {
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
    doc,
    onSnapshot
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const API_BASE = "https://autopay.co.ke";

// Theme
if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light");
}

// Back button
document.getElementById("backBtn").onclick = () => history.back();

// Authentication
onAuthStateChanged(auth,(user)=>{

if(!user){
location.href="login.html";
return;
}

// Load cached merchant first
const cached = JSON.parse(localStorage.getItem("merchant"));

if(cached){
loadMerchant(cached);
}

const userRef = doc(db,"users",user.uid);

onSnapshot(userRef,(snap)=>{

if(!snap.exists()){
location.href="login.html";
return;
}

const merchant = snap.data();

localStorage.setItem("merchant",JSON.stringify(merchant));
localStorage.setItem("merchantUid",user.uid);

loadMerchant(merchant);

},(error)=>{

console.error(error);

});

});

function loadMerchant(merchant){

document.getElementById("merchantId").innerHTML =
merchant.merchantId || "--";

document.getElementById("businessName").innerHTML =
merchant.fullName || "--";

document.getElementById("accountStatus").innerHTML =
merchant.accountStatus || "Active";

document.getElementById("avatar").innerHTML =
(merchant.fullName || "A")
.charAt(0)
.toUpperCase();

}
    
// Copy Helper
function copyText(text){

    navigator.clipboard.writeText(text);

const toast="Copied ✓";

const btn=document.activeElement;

const old=btn.innerHTML;

btn.innerHTML=toast;

setTimeout(()=>{

btn.innerHTML=old;

},1500);

}

// Copy Buttons
document.getElementById("copyStk").onclick = () =>
copyText(document.getElementById("stkEndpoint").innerText);

document.getElementById("copyStatus").onclick = () =>
copyText(document.getElementById("statusEndpoint").innerText);

document.getElementById("copyWebhook").onclick = () =>
copyText(document.getElementById("webhookEndpoint").innerText);

// Test STK Push
document.getElementById("testGateway").onclick = async ()=>{

    const phone =
    document.getElementById("testPhone").value.trim();

    const amount =
    Number(document.getElementById("testAmount").value);

    if(!/^254(7|1)\d{8}$/.test(phone)){

alert("Enter a valid M-Pesa phone number.");

return;

    }

    if(amount<10){

alert("Minimum amount is KES 10.");

return;

    }

        alert("Enter a valid amount");

        return;

    }

    const btn =
    document.getElementById("testGateway");

    if(btn.disabled){
return;
    }

    btn.disabled = true;

    btn.innerHTML="Sending STK Push...";

    try{

        const token =
await auth.currentUser.getIdToken();

const response = await fetch(
            API_BASE + "/api/stk-push",
            {
                method:"POST",
                headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${token}`
},
                body:JSON.stringify({

uid:auth.currentUser.uid,

phone,

amount,

balanceType:"service"

})
            }
        );

        const result = await response.json();

        if(result.success){

            alert(
                "STK Push sent successfully."
            );

        }else{

            alert(
                result.message || "STK Push failed."
            );

        }

    }catch(error){

        console.error(error);

        alert("Network error.");

    }

    } finally {

btn.disabled = false;

btn.innerHTML = "Send Test STK Push";

    }

};
</script>
</body>
</html>
